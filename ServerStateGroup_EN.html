<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health State Tiles - Group Put your SCOM group ID here</title>
    <!--
        External library:
        We use jQuery here mainly to simplify AJAX calls to the SCOM REST API
        and to update HTML elements on the page.

        Important note for the presentation:
        The path starts with "/dashboardlibs/...", which is a host-relative URL.
        That means the browser automatically keeps the current server name, protocol,
        and port of the page that is already open.

        Example:
        If this widget is loaded from http://Server01.domain.com/OperationsManager/...
        then "/dashboardlibs/jquery.js" automatically becomes:
        http://Server01.domain.com/dashboardlibs/jquery.js

        This is why the full server name does not have to be written explicitly
        in every script reference or API call.
    -->
    <script src="/dashboardlibs/jquery.js"></script>
    <style>
        /* Basic page styling for the widget canvas */
        body{font-family:"Segoe UI","Segoe UI Variable",Arial,sans-serif;margin:0;padding:20px;background:#f5f5f5;}

        /* Wrapper that gives us a predictable area for the tile layout */
        .dashboard-stage{position:relative;min-height:640px;}

        /* Flex layout: each server state tile is placed into this responsive grid */
        .grid{position:relative;z-index:2;display:flex;flex-wrap:wrap;gap:22px;justify-content:flex-start;align-items:stretch;}

        /* Individual state tile */
        .tile{
            flex:1 1 320px;min-height:130px;max-width:420px;
            padding:24px 22px;border-radius:14px;color:#fff;
            text-align:center;box-shadow:0 10px 24px rgba(0,0,0,0.18);
            cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
            display:flex;flex-direction:column;justify-content:center;
        }

        /* Small hover effect so the tiles feel more interactive */
        .tile:hover{transform:translateY(-3px);box-shadow:0 14px 28px rgba(0,0,0,0.2);}

        /* Company logo badge fixed to the bottom-right corner of the widget */
        .brand-badge{
            position:fixed;
            right:30px;
            bottom:26px;
            z-index:1;
            padding:14px 18px;
            border-radius:18px;
            background:rgba(255,255,255,0.96);
            border:1px solid rgba(203,213,225,0.9);
            box-shadow:0 18px 38px rgba(15,23,42,0.16);
            pointer-events:none;
            user-select:none;
        }

        /* The actual logo image inside the badge */
        .brand-watermark{
            display:block;
            width:min(320px, 28vw);
            max-width:360px;
            opacity:1;
            filter:saturate(1.08) contrast(1.04);
        }

        /* Tile background colors by health state */
        .state-critical    {background:#d9534f;}
        .state-healthy     {background:#5cb85c;}
        .state-warning     {background:#f0ad4e;}
        .state-unmonitored{background:#6c757d;}
        .state-unknown    {background:#777;}

        /* Text styling: friendly business label first, technical host name second */
        .friendly-name{font-weight:700;font-size:1.05rem;line-height:1.25;}
        .original-host{font-size:1rem;opacity:0.82;margin-top:8px;display:block;line-height:1.3;}

        /* Slightly smaller logo badge on narrower screens */
        @media (max-width:900px){
            .brand-badge{
                right:18px;
                bottom:18px;
                padding:10px 12px;
                border-radius:14px;
            }
            .brand-watermark{
                width:min(220px, 42vw);
            }
        }
    </style>
</head>
<body>

<!--
    Main visual container:
    The JavaScript below fills the #tiles element with one tile per computer.
-->
<div class="dashboard-stage">
    <div id="tiles" class="grid"></div>
</div>

<!-- Static company branding shown independently of the SCOM data -->
<div class="brand-badge">
    <img class="brand-watermark" src="/dashboardlibs/Company_Logo.png" alt="Company logo">
</div>

<script type="text/javascript">
    /* ---------- 1) Dashboard configuration ---------- */
    // The SCOM group GUID defines which set of computers this widget will query.
    // In another environment, this is one of the main values to replace.
    const GROUP_GUID = "Put your SCOM group ID here";

    // Optional mapping from technical host name to a nicer business-friendly label.
    // This is purely for presentation and does not affect data collection.
    const hostToFriendly = {
        "dc01.domain.com":"Domain Controller",
        "srv01.domain.com":"Development Server",
        "Server01.domain.com":"SCOM Server"
    };

    // This helper tries a few different host name formats so the mapping still works
    // even if SCOM returns FQDNs, short names, display names, or paths differently.
    function resolveFriendlyName(row) {
        const display = String(row.displayname || "").trim();
        const path = String(row.path || "").trim();

        const candidates = [
            display,
            path,
            display.toLowerCase(),
            path.toLowerCase(),
            display.split(".")[0].toLowerCase(),
            path.split(".")[0].toLowerCase()
        ].filter(Boolean);

        const normalizedMap = {};
        Object.keys(hostToFriendly).forEach(key => {
            normalizedMap[key.toLowerCase()] = hostToFriendly[key];
            normalizedMap[key.split(".")[0].toLowerCase()] = hostToFriendly[key];
        });

        for (const candidate of candidates) {
            if (normalizedMap[candidate]) {
                return normalizedMap[candidate];
            }
        }
        return display || path || "unknown";
    }

    /* ---------- 2) HTTP request setup for the SCOM REST API ---------- */
    // SCOM expects JSON and usually also needs the CSRF token from the browser cookie.
    //
    // The same host-relative URL concept is used again below for API calls.
    // Example:
    // "/OperationsManager/data/state" does not hardcode Server01.domain.com,
    // because the browser automatically expands it to the current web server,
    // for example:
    // http://Server01.domain.com/OperationsManager/data/state
    const requestHeaders = {
        Accept: 'q=0.8;application/json;q=0.9',
        "Content-Type": "application/json"
    };

    // Read the SCOM CSRF token from the current browser session and attach it
    // to every API request. Without this, SCOM may reject the POST request.
    (function () {
        const m = document.cookie.match(/SCOM-CSRF-TOKEN=([^;]+)/);
        if (m) requestHeaders["SCOM-CSRF-TOKEN"] = decodeURIComponent(m[1]);
    })();

    /* ---------- 3) Load state data from SCOM ---------- */
    // This function calls the SCOM REST endpoint and asks for the health state
    // of all System.Computer objects inside the configured group.
    function loadData() {
        $.ajax({
            url: "/OperationsManager/data/state",
            type: "POST",
            headers: requestHeaders,
            cache: false,                         // Prevent browser caching
            data: JSON.stringify({
                // Query the Windows Computer class
                classId: "System.Library!System.Computer",

                // Expand the selected group and return its members
                objectIds: { [GROUP_GUID]: -1 },

                // We explicitly include all possible health states so nothing is skipped
                criteria: "((HealthState = '0') OR (HealthState = '1') OR (HealthState = '2') OR (HealthState = '3') OR HealthState is null)",

                // Return only the columns that the widget really needs
                displayColumns: [
                    "healthstate",
                    "displayname",
                    "id",
                    "path"
                ],
                _ts: Date.now()                     // Dummy parameter -> force fresh data every time
            }),
            success: function (result) {
                // On success, transform raw API rows into visual tiles
                renderTiles(result.rows);
            },
            error: function () {
                // Simple beginner-friendly error message in the widget
                $('#tiles').html('<p style="color:#d9534f;">Error loading data.</p>');
            }
        });
    }

    /* ---------- 4) Turn the API result into visual state tiles ---------- */
    function renderTiles(rows) {
        // Sort the tiles so problematic states appear first in the UI
        const order = {critical:0, warning:1, healthy:2, unmonitored:3, unknown:4};
        rows.sort((a,b) => (order[a.healthstate]||99) - (order[b.healthstate]||99));

        const $grid = $('#tiles').empty();

        rows.forEach(row => {
            // Choose the CSS class (and therefore the color) based on the health state
            const cssClass = {
                critical:    'state-critical',
                healthy:     'state-healthy',
                warning:     'state-warning',
                unmonitored:'state-unmonitored'
            }[row.healthstate] || 'state-unknown';

            const $tile = $('<div>',{
                class:`tile ${cssClass}`,
                title: row.path || '',
                click: () => {
                    // Each tile is clickable:
                    // clicking it opens the SCOM drilldown page for that object.
                    const guid = row.id;
                    if (!guid) {
                        alert('No object GUID (id) found.');
                        return;
                    }
                    const link = `/OperationsManager/#/monitoring/drilldown/object/${encodeURIComponent(guid)}`;
                    window.open(link,'_blank');
                }
            });

            const originalHost = row.displayname || row.path || 'unknown';
            const friendlyName = resolveFriendlyName(row);

            // Show the friendly business label first.
            // If it differs from the technical host name, we show the original host below it.
            let html = `<span class="friendly-name">${friendlyName}</span>`;
            if (friendlyName !== originalHost) {
                html += `<span class="original-host">${originalHost}</span>`;
            }
            $tile.html(html);
            $grid.append($tile);
        });

        if (!rows.length) {
            // Helpful empty-state message if the group has no members or returns no rows
            $grid.html('<p style="color:#777;">No objects found in the selected group.</p>');
        }
    }

    /* ---------- 5) Widget startup ---------- */
    // When the HTML page is ready:
    // 1. load the data immediately
    // 2. refresh it every 60 seconds so the tiles stay current
    $(document).ready(() => {
        loadData();                 // Initial page load
        // Optional: automatically reload every 60 seconds
         setInterval(loadData, 60000);
    });
</script>
</body>
</html>
