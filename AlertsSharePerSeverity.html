<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alerts Share Per Severity</title>
    <script src="/dashboardlibs/jquery.js"></script>
    <script src="/dashboardlibs/highcharts.js"></script>
    <script src="/dashboardlibs/highcharts-3d.js"></script>
    <script src="/dashboardlibs/modules/exporting.js"></script>
    <style>
        :root {
            --ui-font: "Segoe UI", Arial, sans-serif;
            --bg: #f8fafc;
            --panel: #ffffff;
            --border: #dbe3ee;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
        }

        body {
            margin: 0;
            padding: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--ui-font);
        }

        .widget-shell {
            position: relative;
            min-height: 460px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            flex-wrap: wrap;
        }

        .controls-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 260px;
        }

        .controls-left .title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }

        .controls-left .summary {
            font-size: 13px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 760px;
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            height: 34px;
            font-size: 13px;
            font-family: var(--ui-font);
            border-radius: 10px;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #fff;
            padding: 0 12px;
            box-sizing: border-box;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            font-weight: 600;
        }

        button:hover {
            background: var(--primary-dark);
        }

        #message {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        #message.is-error {
            color: #b00020;
            border-color: #f0c2c2;
        }

        #container {
            position: relative;
            z-index: 2;
            height: 380px;
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        .brand-badge {
            position: fixed;
            right: 30px;
            bottom: 26px;
            z-index: 1;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(203, 213, 225, 0.9);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.14);
            pointer-events: none;
            user-select: none;
        }

        .brand-watermark {
            display: block;
            width: min(220px, 18vw);
            max-width: 240px;
            opacity: 1;
            filter: saturate(1.08) contrast(1.04);
        }

        @media (max-width: 900px) {
            .controls {
                align-items: flex-start;
            }

            .controls-right {
                width: 100%;
                justify-content: flex-start;
            }

            .brand-badge {
                right: 18px;
                bottom: 18px;
                padding: 8px 10px;
                border-radius: 12px;
            }

            .brand-watermark {
                width: min(160px, 34vw);
            }
        }
    </style>
</head>
<body>
    <div class="widget-shell">
        <div class="controls">
            <div class="controls-left">
                <div class="title">Alerts Share Per Severity</div>
                <div id="summary" class="summary">Initializing...</div>
            </div>
            <div class="controls-right">
                <button id="refreshBtn" type="button">Refresh</button>
            </div>
        </div>

        <div id="message">Ready.</div>
        <div id="container"></div>
    </div>
    <div class="brand-badge">
        <img class="brand-watermark" src="/dashboardlibs/Company_Logo.png" alt="POHN IT logo">
    </div>

    <script type="text/javascript">
        var GROUP_ID = "Put your SCOM group ID here";
        var criticalCounter = 0;
        var informationCounter = 0;
        var warningCounter = 0;

        var requestHeaders = {
            Accept: "q=0.8;application/json;q=0.9",
            "Content-Type": "application/json"
        };

        (function initializeCsrfToken() {
            var cookies = document.cookie.split("; ");
            var result = {};
            for (var i = 0; i < cookies.length; i++) {
                var cur = cookies[i].split("=");
                result[cur[0]] = cur[1];
            }
            if (result["SCOM-CSRF-TOKEN"]) {
                requestHeaders["SCOM-CSRF-TOKEN"] = decodeURIComponent(result["SCOM-CSRF-TOKEN"]);
            }
        })();

        function setMessage(text, isError) {
            $("#message").toggleClass("is-error", !!isError).text(text || "");
        }

        function resetCounters() {
            criticalCounter = 0;
            informationCounter = 0;
            warningCounter = 0;
        }

        function updateSummary(total) {
            $("#summary").text("Group: Demo Windows Computers | Alerts in scope: " + total);
        }

        function loadData() {
            resetCounters();
            $("#refreshBtn").prop("disabled", true).text("Loading...");
            setMessage("Loading alert distribution...", false);

            $.ajax({
                url: "/OperationsManager/data/alert",
                type: "POST",
                headers: requestHeaders,
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                processData: false,
                data: JSON.stringify({
                    classId: null,
                    objectIds: { [GROUP_ID]: -1 },
                    criteria: "((Severity = '0') OR (Severity = '1') OR (Severity = '2') OR (Severity = '3')) AND ((Priority = '2') OR (Priority = '1') OR (Priority = '0')) AND ((ResolutionState = '0') OR (ResolutionState = '247') OR (ResolutionState = '248') OR (ResolutionState = '249') OR (ResolutionState = '250') OR (ResolutionState = '254') OR (ResolutionState = '255'))",
                    displayColumns: ["severity", "monitoringobjectdisplayname", "name", "age", "repeatcount", "lastModified"]
                }),
                success: function (result) {
                    for (var i = 0; i < (result.rows || []).length; i++) {
                        switch (result.rows[i].severity) {
                            case "Error":
                                criticalCounter++;
                                break;
                            case "Information":
                                informationCounter++;
                                break;
                            case "Warning":
                                warningCounter++;
                                break;
                        }
                    }
                    renderChart();
                },
                error: function () {
                    $("#container").html("<div style='padding:24px;color:#b00020;font-family:Segoe UI, Arial, sans-serif;'>Failed to load alert data.</div>");
                    updateSummary(0);
                    setMessage("Failed to load alert distribution.", true);
                },
                complete: function () {
                    $("#refreshBtn").prop("disabled", false).text("Refresh");
                }
            });
        }

        function renderChart() {
            var total = criticalCounter + warningCounter + informationCounter;
            updateSummary(total);

            if (total === 0) {
                $("#container").html("<div style='padding:24px;color:#64748b;font-family:Segoe UI, Arial, sans-serif;'>No alerts found.</div>");
                setMessage("No alerts found in the selected scope.", false);
                return;
            }

            Highcharts.chart("container", {
                chart: {
                    type: "pie",
                    backgroundColor: "#ffffff",
                    options3d: {
                        enabled: true,
                        alpha: 45,
                        beta: 0
                    }
                },
                title: {
                    text: "Alerts Share Per Severity"
                },
                tooltip: {
                    pointFormat: "{series.name}: <b>{point.percentage:.1f}%</b>"
                },
                plotOptions: {
                    pie: {
                        allowPointSelect: true,
                        cursor: "pointer",
                        depth: 35,
                        dataLabels: {
                            enabled: true,
                            format: "{point.name}"
                        }
                    }
                },
                series: [{
                    type: "pie",
                    name: "Alerts share",
                    data: [
                        { name: "Critical", y: criticalCounter, sliced: criticalCounter > 0, selected: criticalCounter > 0, color: "#dc2626" },
                        { name: "Warning", y: warningCounter, color: "#f59e0b" },
                        { name: "Information", y: informationCounter, color: "#0284c7" }
                    ]
                }],
                exporting: { enabled: true }
            });

            setMessage("Alert distribution loaded successfully.", false);
        }

        $(function () {
            $("#refreshBtn").on("click", loadData);
            loadData();
        });
    </script>
</body>
</html>
