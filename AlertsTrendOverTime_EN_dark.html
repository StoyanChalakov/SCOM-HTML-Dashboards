<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alerts Trend Over Time</title>
    <script src="/dashboardlibs/jquery.js"></script>
    <script src="/dashboardlibs/highcharts.js"></script>
    <script src="/dashboardlibs/modules/exporting.js"></script>
    <style>
        :root { --ui-font:"Segoe UI",Arial,sans-serif; --bg:#0f172a; --panel:#111827; --panel-2:#0b1220; --border:#23324a; --text:#e5eefc; --muted:#94a3b8; --primary:#3b82f6; --primary-dark:#2563eb; }
        body { margin:0; padding:10px; background:var(--bg); color:var(--text); font-family:var(--ui-font); }
        .widget-shell { position:relative; min-height:460px; }
        .controls { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:12px 14px; margin-bottom:10px; background:linear-gradient(180deg,#172033 0%,#101827 100%); border:1px solid var(--border); border-radius:14px; box-shadow:0 14px 32px rgba(2,6,23,0.45); flex-wrap:wrap; }
        .controls-left { display:flex; flex-direction:column; gap:4px; min-width:260px; }
        .controls-left .title { font-size:18px; font-weight:700; line-height:1.2; }
        .controls-left .summary { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:760px; }
        .controls-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .controls-right label { font-size:13px; font-weight:600; color:#cbd5e1; }
        select, button { height:34px; font-size:13px; font-family:var(--ui-font); border-radius:10px; border:1px solid #334155; background:#0f172a; color:var(--text); padding:0 12px; box-sizing:border-box; }
        button { cursor:pointer; box-shadow:0 1px 2px rgba(15,23,42,0.25); }
        button.primary { background:var(--primary); color:#fff; border-color:var(--primary); font-weight:600; }
        button.primary:hover { background:var(--primary-dark); }
        #message { margin-bottom:10px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:12px; color:var(--muted); font-size:13px; }
        #message.is-error { color:#fda4af; border-color:#7f1d1d; }
        #chartContainer { position:relative; z-index:2; height:380px; background:linear-gradient(180deg,#121b2d 0%,#0b1220 100%); border:1px solid var(--border); border-radius:16px; box-shadow:0 18px 34px rgba(2,6,23,0.45); overflow:hidden; }
        .brand-badge { position:fixed; right:30px; bottom:26px; z-index:1; padding:10px 12px; border-radius:14px; background:rgba(15,23,42,0.88); border:1px solid rgba(71,85,105,0.9); box-shadow:0 14px 28px rgba(2,6,23,0.35); pointer-events:none; user-select:none; }
        .brand-watermark { display:block; width:min(220px,18vw); max-width:240px; opacity:.96; filter:saturate(1.06) contrast(1.02); }
        @media (max-width:900px){ .controls{align-items:flex-start;} .controls-right{width:100%; justify-content:flex-start;} .brand-badge{right:18px; bottom:18px; padding:8px 10px; border-radius:12px;} .brand-watermark{width:min(160px,34vw);} }
    </style>
</head>
<body>
    <div class="widget-shell">
        <div class="controls">
            <div class="controls-left">
                <div class="title">Alerts Trend Over Time</div>
                <div id="summary" class="summary">Initializing...</div>
            </div>
            <div class="controls-right">
                <label for="daysSelect">Range (days)</label>
                <select id="daysSelect">
                    <option value="7">7 days</option>
                    <option value="14">14 days</option>
                    <option value="30">30 days</option>
                    <option value="60">60 days</option>
                </select>
                <button id="refreshBtn" class="primary" type="button">Refresh</button>
            </div>
        </div>
        <div id="message">Ready.</div>
        <div id="chartContainer"></div>
    </div>
    <div class="brand-badge">
        <img class="brand-watermark" src="/dashboardlibs/Company_Logo.png" alt="Company logo">
    </div>
    <script type="text/javascript">
        var GROUP_ID = "Put your SCOM group ID here";
        var requestHeaders = { Accept:"q=0.8;application/json;q=0.9", "Content-Type":"application/json" };
        (function(){ var match=document.cookie.match(/SCOM-CSRF-TOKEN=([^;]+)/); if(match){ requestHeaders["SCOM-CSRF-TOKEN"]=decodeURIComponent(match[1]); } })();
        function setMessage(text,isError){ $("#message").toggleClass("is-error",!!isError).text(text||""); }
        function pad2(v){ return (v<10?"0":"")+v; }
        function formatHuman(d){ return pad2(d.getDate())+"."+pad2(d.getMonth()+1)+"."+d.getFullYear(); }
        function parseScomDate(value){ if(!value) return null; if(typeof value==="string"){ var m=value.match(/\/Date\((\d+)(?:[+-]\d+)?\)\//); if(m){ var ms=parseInt(m[1],10); if(!isNaN(ms)) return new Date(ms); } } var d=new Date(value); return isNaN(d.getTime())?null:d; }
        function getAlertDate(alert){ var fields=["timegenerated","timeGenerated","timeraised","timeRaised","timeadded","timeAdded","timecreated","timeCreated","lastModified","lastmodified"]; for(var i=0;i<fields.length;i++){ var raw=alert[fields[i]]; if(raw!=null&&raw!==""){ var parsed=parseScomDate(raw); if(parsed) return parsed; } } return null; }
        function normalizeSeverity(sev){ var s=String(sev==null?"":sev).trim().toLowerCase(); if(s==="2"||s==="error"||s==="critical") return "Critical"; if(s==="1"||s==="warning") return "Warning"; if(s==="0"||s==="information"||s==="info") return "Information"; return null; }
        function updateSummary(startDate,endDate,totalAlerts){ $("#summary").text("Group: Demo Windows Computers | Range: "+formatHuman(startDate)+" - "+formatHuman(endDate)+" | Alerts in range: "+totalAlerts); }
        function buildBuckets(startDate,days){ var categories=[], indexMap={}; for(var i=0;i<days;i++){ var d=new Date(startDate.getTime()); d.setDate(startDate.getDate()+i); var key=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); indexMap[key]=i; categories.push(pad2(d.getDate())+"."+pad2(d.getMonth()+1)); } return { categories:categories, indexMap:indexMap }; }
        function renderChart(categories,criticalData,warningData,informationData){
            Highcharts.chart("chartContainer",{
                chart:{ type:"areaspline", backgroundColor:"#101827", spacingTop:18, spacingRight:18, spacingBottom:18, spacingLeft:18, style:{ fontFamily:"Segoe UI, Arial, sans-serif" } },
                title:{ text:"Open Alerts Trend", style:{ color:"#e5eefc", fontWeight:"700" } },
                xAxis:{ categories:categories, tickmarkPlacement:"on", title:{ text:"Day", style:{ color:"#94a3b8" } }, labels:{ style:{ color:"#cbd5e1" } }, lineColor:"#334155", tickColor:"#334155" },
                yAxis:{ title:{ text:"Number of alerts", style:{ color:"#94a3b8" } }, allowDecimals:false, min:0, gridLineColor:"rgba(148,163,184,0.16)", labels:{ style:{ color:"#cbd5e1" } } },
                tooltip:{ shared:true, valueSuffix:" alert(s)", backgroundColor:"rgba(15,23,42,0.95)", borderColor:"#334155", style:{ color:"#e5eefc" } },
                legend:{ enabled:true, itemStyle:{ color:"#dbeafe" }, itemHoverStyle:{ color:"#ffffff" } },
                plotOptions:{ areaspline:{ fillOpacity:.14, lineWidth:3, marker:{ enabled:true, radius:3 } }, series:{ animation:true } },
                series:[ {name:"Critical",data:criticalData,color:"#ef4444"}, {name:"Warning",data:warningData,color:"#f59e0b"}, {name:"Information",data:informationData,color:"#38bdf8"} ],
                exporting:{ enabled:true },
                credits:{ enabled:true, style:{ color:"#64748b" } }
            });
        }
        function loadData(){
            var days=parseInt($("#daysSelect").val(),10)||7;
            var now=new Date();
            var endDate=new Date(now.getFullYear(), now.getMonth(), now.getDate());
            endDate.setDate(endDate.getDate()+1);
            var startDate=new Date(endDate.getTime());
            startDate.setDate(endDate.getDate()-days);
            $("#refreshBtn").prop("disabled",true).text("Loading...");
            setMessage("Loading alert trend data...",false);
            $.ajax({
                url:"/OperationsManager/data/alert",
                type:"POST",
                headers:requestHeaders,
                contentType:"application/json; charset=utf-8",
                dataType:"json",
                processData:false,
                data:JSON.stringify({ classId:null, objectIds:{ [GROUP_ID]:-1 }, criteria:"((Severity = '0') OR (Severity = '1') OR (Severity = '2') OR (Severity = '3')) AND ((Priority = '2') OR (Priority = '1') OR (Priority = '0')) AND ((ResolutionState = '0') OR (ResolutionState = '247') OR (ResolutionState = '248') OR (ResolutionState = '249') OR (ResolutionState = '250') OR (ResolutionState = '254') OR (ResolutionState = '255'))", displayColumns:["severity","timegenerated","timeGenerated","timeraised","timeRaised","timeadded","timeAdded","timecreated","timeCreated","lastModified","name"] }),
                success:function(result){
                    var buckets=buildBuckets(startDate,days), criticalData=new Array(days).fill(0), warningData=new Array(days).fill(0), informationData=new Array(days).fill(0), totalAlerts=0;
                    (result.rows||[]).forEach(function(row){
                        var sev=normalizeSeverity(row.severity); if(!sev) return;
                        var d=getAlertDate(row); if(!d) return;
                        var key=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
                        var idx=buckets.indexMap[key]; if(idx==null) return;
                        totalAlerts++;
                        if(sev==="Critical") criticalData[idx]++; if(sev==="Warning") warningData[idx]++; if(sev==="Information") informationData[idx]++;
                    });
                    if(totalAlerts===0){
                        $("#chartContainer").html("<div style='padding:24px;color:#94a3b8;font-family:Segoe UI, Arial, sans-serif;'>No alerts found in the selected time range.</div>");
                        updateSummary(startDate,new Date(endDate.getTime()-86400000),0);
                        setMessage("No alerts found in the selected time range.",false);
                    } else {
                        renderChart(buckets.categories,criticalData,warningData,informationData);
                        updateSummary(startDate,new Date(endDate.getTime()-86400000),totalAlerts);
                        setMessage("Trend loaded successfully.",false);
                    }
                },
                error:function(xhr,status,err){
                    console.error("AJAX error:",status,err);
                    $("#chartContainer").html("<div style='padding:24px;color:#fda4af;font-family:Segoe UI, Arial, sans-serif;'>Failed to load alert trend data.</div>");
                    setMessage("Failed to load alert trend data.",true);
                },
                complete:function(){ $("#refreshBtn").prop("disabled",false).text("Refresh"); }
            });
        }
        $(function(){ $("#daysSelect").val("7"); $("#daysSelect").on("change",loadData); $("#refreshBtn").on("click",loadData); loadData(); });
    </script>
</body>
</html>
